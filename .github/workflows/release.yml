# Automatic Electron release workflow
# Triggers when you push a version tag like v1.0.1
#
# USAGE:
#   npm run release:patch   (bumps version, commits, tags, pushes)
#
# This will:
#   1. Build the Windows installer + portable exe
#   2. Create a GitHub Release with the tag
#   3. Upload the .exe + latest.yml to the release
#   4. electron-updater on client machines picks it up automatically

name: Build & Release Electron App

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build Electron app & publish to GitHub Releases
        env:
          # Use built-in GITHUB_TOKEN (works for public repos, no setup needed)
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npx electron-builder --win --publish always

      - name: List build artifacts
        run: |
          echo "=== Build output ==="
          Get-ChildItem -Path electron-dist -Include *.exe,*.yml,*.blockmap -Recurse | Format-Table Name, Length
